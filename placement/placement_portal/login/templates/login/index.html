<!DOCTYPE html>
<html>
<head>
    <title>Placement Portal</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f7fa;
        }
        nav {
            background: #2c3e50;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
        }
        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }
        .hero {
            text-align: center;
            padding: 100px 20px;
        }
        .hero h1 {
            font-size: 40px;
            color: #2c3e50;
        }
        .btn {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            margin: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<nav>
    <div><b>Placement Portal</b></div>
    <div>
        <a href="/login/">Login</a>
        <a href="/signup/">Signup</a>
    </div>
</nav>

<div class="hero">
    <h1>Welcome to Smart Placement Portal</h1>
    <p>Find jobs, apply easily, and track your placement journey</p>
    <a href="/login/"><button class="btn">Get Started</button></a>
</div>

</body>
</html>
