<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <style>
        body {
            background: linear-gradient(to right, #43e97b, #38f9d7);
            font-family: Arial;
        }
        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }
        h2 {
            text-align: center;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Signup</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <select name="role">
            <option value="student">Student</option>
            <option value="recruiter">Recruiter</option>
        </select>

        <button type="submit">Signup</button>
    </form>

</div>

</body>
</html>
