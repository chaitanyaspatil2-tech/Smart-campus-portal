<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <style>
        body {
            font-family: Arial;
            background: #ecf0f1;
        }
        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }
        h2 {
            text-align: center;
        }
        p {
            margin: 10px 0;
        }
        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            background: #2c3e50;
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>User Profile</h2>

    <p><b>Username:</b> {{ request.user.username }}</p>
    <p><b>Email:</b> {{ request.user.email }}</p>

    <a href="/dashboard/">Back to Dashboard</a>
</div>

</body>
</html>
